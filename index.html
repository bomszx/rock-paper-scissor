<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor</title>
    <script src="script.js" defer></script>
</head>
<body>
    <head>
        <h1>ROCK-PAPER-SCISSOR</h1>
    </head>

    <div class="logger">
        <div class="banner">
            <h1 class="message">Stand by...</h1>
        </div>
        <div class="player-log">
            <h3 id="player-choice">?</h3>
        </div>
        <div class="computer-log">
            <h3 id="computer-choice">?</h3>
        </div>
    </div>

    <div class="container">
        <div class="buttons">
            <button class="button" id="rock">I'm rock!</button>
            <button class="button" id="paper">I'm paper!</button>
            <button class="button" id="scissors">I'm scissor!</button>
        </div>
    </div>

    <div class="score">
        <div class="player">
            <h3 id="player-score">0</h3>
        </div>
        <div class="computer">
            <h3 id="computer-score">0</h3>
        </div>
    </div>
</body>
</html>
